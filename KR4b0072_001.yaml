body:
  text: 卷一羅敷行邑中有好女姓秦字羅敷巧笑美回盻鬢髮復凝膚腳著花文履耳穿明月珠頭作墮馬髻倒枕象牙梳姌姌善趨步襜襜曳長裾王侯為之顧駟馬自踟蹰樂府詩集二十八詩紀百八王子喬王少卿王少卿超升飛龍翔天庭遺儀景雲漢酬光騖電逝忽若浮騎日月從列星跨騰太廓踰杳冥尋元氣出天門窮覽有無究道根樂府詩集二十九詩紀百八答宗欽十三章湯湯流漢藹藹南都載稱多士載耀靈珠邈矣高族代記丹圖啓基邦域振彩涼區吾生倜儻誕發英風紹熙前緒奕世克隆方圓備體淑德斯融望傾群雄響振華戎響振伊何金聲克著匡贊西藩拯厥時務放志琴書恬心初素潛思泉渟秀藻雲布上天降命祚鍾有代協耀紫宸與乾作配仁邁春陽功隆覆載招延隱叟永貽大賚伊余櫟散才朽質微遭緣幸會忝與樞機竊名華省廁足丹墀愧無熒燭少益天暉明升非諭信漸難兼體卑處下豈曰能謙進不弘道退失深潛既慚朱闕亦愧閭閻史班稱達楊蔡致深負荷典策載蹈於心四轍同軌覆車相尋敬承嘉誨永佩明針遠思古賢內尋諸己仰謝丘明長揖南史遐武雖存高蹤難擬夙興夕惕豈獲恬止時之圮矣靈運未通風馬殊隔區域異封有懷西望路險莫從王澤遠灑九服來同在昔平吳二陸稱寶今也剋涼吾生獨矯道映儒林義為群表我思與之均於紵縞仁乏田蘇量非叔度韓生屢降林宗仍顧千載曠遊遘茲一遇藻詠風流鄙心已悟年時迅邁物我俱逝任之斯通擁之則滯結駟貽塵屢空亦敝兩聞可守安有回賜詩以言志志以表丹慨哉刎頸義已中殘雖曰不敏請事金蘭爾其勵之無忘歲寒魏書宗欽傳詩紀百八又文館詞林百五十八所引缺末一章詠貞婦彭城劉氏八章兩儀正位人倫肇甄爰制夫婦統業承先雖曰異族氣猶自然生則同室終契黃泉封生令達卓為時彥內協黃中外兼三變誰能作配克應其選實有華宗挺生淑媛京野勢殊山川乖互乃奉王命載馳在路公務既弘私義獲著因媒致幣遘止一暮率我初冠眷彼弱笄形由禮比情以趣諧欣願難常影跡易乖悠悠言邁戚戚長懷時值險屯橫離塵網伏鑕就刑身分土壤千里雖遐應如影響良嬪洞感發於夢想仰惟親命俯尋嘉好誰謂會淺義深情到畢志守窮誓不二醮何以驗之殞身是效人之處世孰不厚生心存於義所重則輕結憤鍾心甘就幽冥永捐堂宇長辭母兄茫茫中野翳翳孤丘葛虆冥蒙荊棘四周理苟不昧神必俱游異哉貞婦曠世靡儔魏書列女傳詩紀百八
